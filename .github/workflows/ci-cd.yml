name: VitalSync CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_USERNAME: te1ks9
  BACKEND_IMAGE: te1ks9/vitalsync-backend
  FRONTEND_IMAGE: te1ks9/vitalsync-frontend

jobs:
  # ─── Job 1: Lint & Test ────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint
        working-directory: backend
        run: npm run lint

      - name: Run tests
        working-directory: backend
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/

  # ─── Job 2: Build & Push Docker Hub ───────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Git SHA (short)
        id: vars
        run: echo "SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to Staging (simulé via docker-compose sur le runner) ──────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Git SHA (short)
        id: vars
        run: echo "SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Pull backend image from Docker Hub
        run: |
          docker pull ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHA }}

      - name: Deploy backend container (staging simulé)
        run: |
          docker run -d \
            --name vitalsync-staging \
            -p 3000:3000 \
            -e NODE_ENV=staging \
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHA }}
          echo "Conteneur démarré, attente de 10s..."
          sleep 10

      - name: Health check avec retry (curl --retry 5)
        run: |
          echo "Vérification de santé du backend — SHA: ${{ steps.vars.outputs.SHA }}"
          curl --retry 5 \
               --retry-delay 3 \
               --retry-connrefused \
               --fail \
               --max-time 10 \
               http://localhost:3000/health
          echo ""
          echo "Backend opérationnel !"

      - name: Afficher les conteneurs actifs
        if: always()
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Notify deployment success
        if: success()
        run: echo "Déploiement staging réussi - SHA:${{ steps.vars.outputs.SHA }}"

      - name: Notify deployment failure
        if: failure()
        run: echo "ÉCHEC du déploiement staging - SHA:${{ steps.vars.outputs.SHA }}"
